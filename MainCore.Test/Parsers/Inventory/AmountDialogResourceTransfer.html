<!DOCTYPE html>
<html>
<body>
  <div id="reactDialogWrapper">
    <div class="dialogOverlay dialogVisible enabled">
      <div class="dialogWrapper dialogV2">
        <div class="dialogContents">
          <form action="?" method="get">
            <div class="contentV2" id="dialogContent">
              <h3>Transfer resources</h3>
              <div class="resourceRow">
                <div class="resourceInput formV2">
                  <label class="input">
                    <input value="0" name="lumber" />
                  </label>
                </div>
              </div>
              <div class="resourceRow">
                <div class="resourceInput formV2">
                  <label class="input">
                    <input value="0" name="clay" />
                  </label>
                </div>
              </div>
              <div class="resourceRow">
                <div class="resourceInput formV2">
                  <label class="input">
                    <input value="0" name="iron" />
                  </label>
                </div>
              </div>
              <div class="resourceRow">
                <div class="resourceInput formV2">
                  <label class="input">
                    <input value="0" name="crop" />
                  </label>
                </div>
              </div>
              <div class="actionButton">
                <button id="transferMaximumBtn" class="textButtonV2 buttonFramed rectangle withText withLoadingIndicator green" type="button">
                  <div>Transfer maximum</div>
                </button>
                <button id="transferBtn" class="textButtonV2 buttonFramed rectangle withText withLoadingIndicator green" type="button">
                  <div>Transfer</div>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
